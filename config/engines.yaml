motores:
  imagen:
    nombre: "🖼️ Generación de Imágenes"
    herramientas:
      - "DALL-E 3"
      - "Midjourney v6"
      - "Stable Diffusion XL"
      - "Ideogram"
      - "Leonardo.AI"
    parametros:
      estilo:
        label: "Estilo visual"
        opciones:
          - "Realista fotográfico"
          - "Ilustración digital"
          - "Anime/Manga"
          - "3D CGI"
          - "Pintura óleo"
          - "Abstracto"
      mood:
        label: "Mood/Atmósfera"
        opciones:
          - "Alegre/Positivo"
          - "Oscuro/Dramático"
          - "Neutral/Profesional"
          - "Épico/Heroico"
          - "Melancólico"
          - "Futurista"
      resolucion:
        label: "Resolución"
        opciones:
          - "1024x1024"
          - "1920x1080"
          - "1080x1920"
          - "768x1024"
          - "4K+"
      detalles:
        label: "Nivel de detalle"
        opciones:
          - "Minimalista"
          - "Moderado"
          - "Hyper-detallado"

  texto:
    nombre: "📝 Generación de Texto"
    herramientas:
      - "ChatGPT"
      - "Claude"
      - "Gemini"
      - "Perplexity"
      - "Llama"
    parametros:
      tipo:
