          - "Casual"
          - "Creativo"
          - "Técnico"
          - "Humorístico"
      largo:
        label: "Largo del contenido"
        opciones:
          - "Corto (200-500 palabras)"
          - "Medio (500-1500 palabras)"
          - "Largo (1500+ palabras)"
      estructura:
        label: "Estructura"
        opciones:
          - "Narrativa"
          - "Bullet points"
          - "Q&A"
          - "Paso-a-paso"

  musica:
